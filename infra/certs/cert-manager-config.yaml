# =============================================================================
# OncoIDT cert-manager Configuration
#
# Development: Self-signed ClusterIssuer
# Production:  Uncomment the Let's Encrypt issuer section below
#
# Prerequisites:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Self-signed ClusterIssuer (development)
# ---------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: oncoidt-selfsigned
spec:
  selfSigned: {}
---
# Bootstrap CA certificate using self-signed issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oncoidt-ca
  namespace: oncoidt
spec:
  isCA: true
  commonName: oncoidt-dev-ca
  secretName: oncoidt-ca-tls
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: oncoidt-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA-backed ClusterIssuer for signing service certs
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: oncoidt-ca-issuer
spec:
  ca:
    secretName: oncoidt-ca-tls
---
# ---------------------------------------------------------------------------
# Per-service Certificate resources
# ---------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-gateway-tls
  namespace: oncoidt
spec:
  secretName: api-gateway-tls
  issuerRef:
    name: oncoidt-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - api-gateway
    - api-gateway.oncoidt
    - api-gateway.oncoidt.svc.cluster.local
---
apiVersion: cert-manager.io/v1
kind: Certificate

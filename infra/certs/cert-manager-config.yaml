# =============================================================================
# PRODUCTION SETUP — Let's Encrypt
# =============================================================================
# Uncomment and configure the following for production use with Let's Encrypt.
# Replace <your-email> with a valid email address for ACME notifications.
#
# ---
# apiVersion: cert-manager.io/v1
# kind: ClusterIssuer
# metadata:
#   name: letsencrypt-prod
# spec:
#   acme:
#     server: https://acme-v02.api.letsencrypt.org/directory
#     email: <your-email>
#     privateKeySecretRef:
#       name: letsencrypt-prod-account-key
#     solvers:
#       - http01:
#           ingress:
#             class: nginx
#
# Then update each Certificate's issuerRef to:
#   issuerRef:
#     name: letsencrypt-prod
#     kind: ClusterIssuer
#
# And add your public DNS names to the dnsNames list.
# =============================================================================

# =============================================================================
# OncoIDT — full-stack docker-compose
# 18 services: 4 infra + 11 app + frontend + prometheus + grafana
# =============================================================================

x-app-common: &app-common
  restart: unless-stopped
  env_file: .env
  networks:
    - oncoidt
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

x-app-env: &app-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: oncoidt
  POSTGRES_USER: oncoidt
  POSTGRES_PASSWORD: oncoidt_secret
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: neo4j_secret
  MLFLOW_TRACKING_URI: http://mlflow:5000
  JWT_SECRET: CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET
  LOG_LEVEL: INFO

networks:
  oncoidt:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  mlflow_data:
  grafana_data:
  prometheus_data:

services:

  # ---------------------------------------------------------------------------
  # 1. PostgreSQL + TimescaleDB
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: oncoidt-postgres
    restart: unless-stopped
    networks:
      - oncoidt
    environment:
      POSTGRES_DB: oncoidt
      POSTGRES_USER: oncoidt
      POSTGRES_PASSWORD: oncoidt_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncoidt -d oncoidt"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 2. Neo4j
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.20.0-community
    container_name: oncoidt-neo4j
    restart: unless-stopped
    networks:
      - oncoidt
    environment:
      NEO4J_AUTH: neo4j/neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache__size: "256m"
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ---------------------------------------------------------------------------
  # 3. Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: oncoidt-redis
    restart: unless-stopped
    networks:
      - oncoidt
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # 4. MLflow
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: .
      dockerfile: services/mlflow/Dockerfile
    container_name: oncoidt-mlflow
    restart: unless-stopped
    networks:
      - oncoidt
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://oncoidt:oncoidt_secret@postgres:5432/oncoidt
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --backend-store-uri postgresql+psycopg2://oncoidt:oncoidt_secret@postgres:5432/oncoidt
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    healthcheck:
      disable: true

  # ---------------------------------------------------------------------------
  # 5. Ingestion Service (port 8001)
  # ---------------------------------------------------------------------------
  ingestion-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: oncoidt-ingestion
    environment:
      <<: *app-env
      SERVICE_NAME: ingestion-service
      INGESTION_SERVICE_PORT: "8001"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 6. Graph Service (port 8002)
  # ---------------------------------------------------------------------------
  graph-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/graph/Dockerfile
    container_name: oncoidt-graph
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      SERVICE_NAME: graph-service
      GRAPH_SERVICE_PORT: "8002"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 7. Inference Service (port 8003)
  # ---------------------------------------------------------------------------
  inference-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    container_name: oncoidt-inference
    environment:
      <<: *app-env
      SERVICE_NAME: inference-service
      INFERENCE_SERVICE_PORT: "8003"
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 8. Reasoner Service (port 8004)
  # ---------------------------------------------------------------------------
  reasoner-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/reasoner/Dockerfile
    container_name: oncoidt-reasoner
    environment:
      <<: *app-env
      SERVICE_NAME: reasoner-service
      REASONER_SERVICE_PORT: "8004"
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 9. Alert Service (port 8005)
  # ---------------------------------------------------------------------------
  alert-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/alerts/Dockerfile
    container_name: oncoidt-alerts
    environment:
      <<: *app-env
      SERVICE_NAME: alert-service
      ALERT_SERVICE_PORT: "8005"
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 10. Explainability Service (port 8006)
  # ---------------------------------------------------------------------------
  explainability-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/explainability/Dockerfile
    container_name: oncoidt-explainability
    environment:
      <<: *app-env
      SERVICE_NAME: explainability-service
      EXPLAINABILITY_SERVICE_PORT: "8006"
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8006/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 11. Simulation Service (port 8007)
  # ---------------------------------------------------------------------------
  simulation-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/simulation/Dockerfile
    container_name: oncoidt-simulation
    environment:
      <<: *app-env
      SERVICE_NAME: simulation-service
      SIMULATION_SERVICE_PORT: "8007"
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8007/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 12. Training Service (port 8008)
  # ---------------------------------------------------------------------------
  training-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/training/Dockerfile
    container_name: oncoidt-training
    environment:
      <<: *app-env
      SERVICE_NAME: training-service
      TRAINING_SERVICE_PORT: "8008"
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 13. Feature Store Service (port 8009)
  # ---------------------------------------------------------------------------
  feature-store-service:
    <<: *app-common
    build:
      context: .
      dockerfile: services/feature_store/Dockerfile
    container_name: oncoidt-feature-store
    environment:
      <<: *app-env
      SERVICE_NAME: feature-store-service
      FEATURE_STORE_SERVICE_PORT: "8009"
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8009/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 14. API Gateway (port 8000)
  # ---------------------------------------------------------------------------
  api-gateway:
    <<: *app-common
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: oncoidt-api-gateway
    environment:
      <<: *app-env
      SERVICE_NAME: api-gateway
      API_GATEWAY_PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 15. WebSocket Hub (port 8010)
  # ---------------------------------------------------------------------------
  websocket-hub:
    <<: *app-common
    build:
      context: .
      dockerfile: services/websocket-hub/Dockerfile
    container_name: oncoidt-websocket-hub
    environment:
      <<: *app-env
      SERVICE_NAME: websocket-hub
      WEBSOCKET_HUB_PORT: "8010"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 16. Frontend (port 3000)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oncoidt-frontend
    restart: unless-stopped
    networks:
      - oncoidt
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8010
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
      - websocket-hub

  # ---------------------------------------------------------------------------
  # 17. Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: oncoidt-prometheus
    restart: unless-stopped
    networks:
      - oncoidt
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ---------------------------------------------------------------------------
  # 18. Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: oncoidt-grafana
    restart: unless-stopped
    networks:
      - oncoidt
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: oncoidt_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

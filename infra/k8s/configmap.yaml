apiVersion: v1
kind: ConfigMap
metadata:
  name: oncoidt-config
  namespace: oncoidt
data:
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "oncoidt"
  POSTGRES_USER: "oncoidt"
  REDIS_URL: "redis://redis:6379/0"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  MLFLOW_EXPERIMENT_NAME: "oncoidt"
  MLFLOW_MODEL_REGISTRY_NAME: "oncoidt-model"
  LOG_LEVEL: "INFO"
  SERVICE_VERSION: "0.1.0"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRY_MINUTES: "60"
  FEATURE_STORE_DEFAULT_VERSION: "v1"
  FEATURE_STORE_SLA_MS: "100"
  INFERENCE_BATCH_RESCORE_INTERVAL_SECONDS: "300"
  INFERENCE_MODEL_POLL_INTERVAL_SECONDS: "30"
  ALERT_INFECTION_RISK_THRESHOLD: "0.6"
  ALERT_DETERIORATION_RISK_THRESHOLD: "0.65"
  ALERT_DEDUP_WINDOW_MINUTES: "30"
  REDIS_STREAM_MAX_LEN: "100000"

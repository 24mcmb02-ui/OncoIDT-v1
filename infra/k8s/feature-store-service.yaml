apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-store-service
  namespace: oncoidt
  labels:
    app: feature-store-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feature-store-service
  template:
    metadata:
      labels:
        app: feature-store-service
    spec:
      containers:
        - name: feature-store-service
          image: oncoidt/feature-store-service:latest
          ports:
            - containerPort: 8009
          env:
            - name: SERVICE_NAME
              value: feature-store-service
          envFrom:
            - configMapRef:
                name: oncoidt-config
            - secretRef:
                name: oncoidt-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8009
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8009
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: feature-store-service
  namespace: oncoidt
spec:
  type: ClusterIP
  selector:
    app: feature-store-service
  ports:
    - port: 8009
      targetPort: 8009
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feature-store-service
  namespace: oncoidt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feature-store-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

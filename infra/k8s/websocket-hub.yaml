apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-hub
  namespace: oncoidt
  labels:
    app: websocket-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-hub
  template:
    metadata:
      labels:
        app: websocket-hub
    spec:
      containers:
        - name: websocket-hub
          image: oncoidt/websocket-hub:latest
          ports:
            - containerPort: 8010
          env:
            - name: SERVICE_NAME
              value: websocket-hub
          envFrom:
            - configMapRef:
                name: oncoidt-config
            - secretRef:
                name: oncoidt-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-hub
  namespace: oncoidt
spec:
  type: ClusterIP
  selector:
    app: websocket-hub
  ports:
    - port: 8010
      targetPort: 8010
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: websocket-hub
  namespace: oncoidt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: websocket-hub
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
